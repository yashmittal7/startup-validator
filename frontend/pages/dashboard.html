<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — StartupValidator</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .dashboard-hero { background: linear-gradient(135deg, rgba(124,111,255,0.08) 0%, transparent 60%); border-bottom: 1px solid var(--border); padding: 2.5rem 0; margin-bottom: 2.5rem; }
    .dashboard-hero h1 { font-family: var(--font-head); font-size: 1.9rem; font-weight: 800; margin-bottom: 0.35rem; }
    .dashboard-hero p { color: var(--text-muted); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.25rem; margin-bottom: 2.5rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
    .stat-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; margin-bottom: 0.5rem; }
    .stat-value { font-family: var(--font-head); font-size: 2.2rem; font-weight: 800; color: var(--accent2); }
    .actions { display: flex; gap: 1rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
    .recent-title { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; }
    .idea-list { display: flex; flex-direction: column; gap: 1rem; }
    .idea-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.4rem 1.75rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; transition: border-color 0.2s; cursor: pointer; }
    .idea-card:hover { border-color: var(--accent); }
    .idea-info h3 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
    .idea-meta { display: flex; gap: 0.75rem; align-items: center; font-size: 0.83rem; color: var(--text-muted); }
    .idea-score { font-family: var(--font-head); font-size: 1.5rem; font-weight: 800; color: var(--accent2); white-space: nowrap; }
    .idea-score span { font-size: 0.75rem; color: var(--text-dim); font-family: var(--font-body); font-weight: 400; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">⚡ StartupValidator</div>
    <div class="navbar-links">
      <span id="user-name" style="color: var(--text-muted); font-size: 0.9rem;"></span>
      <button class="btn btn-outline" onclick="logout()" style="padding: 0.4rem 1rem; font-size: 0.85rem;">Logout</button>
    </div>
  </nav>

  <div class="dashboard-hero">
    <div class="container">
      <h1 id="welcome-msg">Welcome back! 👋</h1>
      <p>Here's your startup idea overview</p>
    </div>
  </div>

  <div class="page-wrap">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Ideas</div><div class="stat-value" id="total-ideas">—</div></div>
      <div class="stat-card"><div class="stat-label">Avg. Market Score</div><div class="stat-value" id="avg-score">—</div></div>
      <div class="stat-card"><div class="stat-label">Latest Industry</div><div class="stat-value" id="latest-industry" style="font-size:1.1rem; padding-top: 0.6rem;">—</div></div>
    </div>

    <div class="actions">
      <a href="./validate.html" class="btn btn-primary btn-lg">✦ Validate New Idea</a>
      <a href="./ideas.html" class="btn btn-outline btn-lg">View All Ideas →</a>
    </div>

    <div>
      <h2 class="recent-title">Recent Ideas</h2>
      <div id="idea-list" class="idea-list">
        <div style="color: var(--text-muted); text-align:center; padding: 2rem;"><span class="spinner"></span></div>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    requireAuth();

    const user = getUser();
    if (user) {
      document.getElementById('user-name').textContent = user.name;
      document.getElementById('welcome-msg').textContent = `Welcome back, ${user.name}! 👋`;
    }

    function logout() { clearAuth(); window.location.href = '../index.html'; }

    async function loadIdeas() {
      try {
        const ideas = await apiCall('/ideas');
        document.getElementById('total-ideas').textContent = ideas.length;

        if (ideas.length > 0) {
          const avg = (ideas.reduce((s, i) => s + (i.analysis?.marketScore || 0), 0) / ideas.length).toFixed(1);
          document.getElementById('avg-score').textContent = avg + '/10';
          document.getElementById('latest-industry').textContent = ideas[0].industry;
        }

        const recent = ideas.slice(0, 5);
        const listEl = document.getElementById('idea-list');

        if (recent.length === 0) {
          listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">💡</div><p>No ideas yet. Validate your first startup idea!</p><a href="./validate.html" class="btn btn-primary">Validate an Idea</a></div>`;
          return;
        }

        listEl.innerHTML = recent.map(idea => `
          <div class="idea-card" onclick="window.location.href='./result.html?id=${idea._id}'">
            <div class="idea-info">
              <h3>${idea.startupName}</h3>
              <div class="idea-meta"><span class="badge badge-purple">${idea.industry}</span><span>${formatDate(idea.createdAt)}</span></div>
            </div>
            <div class="idea-score">${idea.analysis?.marketScore || '—'}<span>/10</span></div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('idea-list').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    loadIdeas();
  </script>
</body>
</html>
