<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Ideas — StartupValidator</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .ideas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }
    .idea-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; transition: border-color 0.2s, transform 0.2s; }
    .idea-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .idea-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; }
    .idea-card-title { font-family: var(--font-head); font-size: 1.1rem; font-weight: 800; }
    .idea-card-score { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; color: var(--accent2); white-space: nowrap; }
    .idea-card-score small { font-size: 0.7rem; color: var(--text-dim); font-family: var(--font-body); font-weight: 400; }
    .idea-card-description { color: var(--text-muted); font-size: 0.87rem; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .idea-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; gap: 0.75rem; }
    .idea-date { font-size: 0.8rem; color: var(--text-dim); }
    .idea-card-actions { display: flex; gap: 0.5rem; }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.82rem; border-radius: 8px; }
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 998; align-items: center; justify-content: center; }
    .modal-backdrop.active { display: flex; }
    .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; max-width: 400px; width: 90%; }
    .modal-box h3 { font-family: var(--font-head); font-size: 1.2rem; font-weight: 800; margin-bottom: 0.75rem; }
    .modal-box p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
  </style>
</head>
<body>
  <div class="modal-backdrop" id="delete-modal">
    <div class="modal-box">
      <h3>Delete this idea?</h3>
      <p>This will permanently delete this startup idea and its analysis. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" id="confirm-delete-btn" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <nav class="navbar">
    <a href="./dashboard.html" class="navbar-brand">⚡ StartupValidator</a>
    <div class="navbar-links">
      <a href="./dashboard.html" class="nav-link">← Dashboard</a>
      <a href="./validate.html" class="btn btn-primary" style="font-size:0.85rem; padding: 0.45rem 1rem;">+ New Idea</a>
    </div>
  </nav>

  <div class="page-wrap">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem;">
      <div>
        <h1 class="page-title" style="margin-bottom:0.2rem;">All Ideas</h1>
        <p style="color:var(--text-muted); font-size:0.9rem;" id="idea-count">Loading...</p>
      </div>
      <a href="./validate.html" class="btn btn-primary">✦ Validate New Idea</a>
    </div>

    <div id="ideas-container">
      <div style="text-align:center; padding: 3rem;"><span class="spinner" style="width:32px; height:32px; border-width:3px;"></span></div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    requireAuth();

    let deleteTargetId = null;
    let allIdeas = [];

    function openDeleteModal(id) { deleteTargetId = id; document.getElementById('delete-modal').classList.add('active'); }
    function closeModal() { document.getElementById('delete-modal').classList.remove('active'); deleteTargetId = null; }

    async function confirmDelete() {
      if (!deleteTargetId) return;
      const btn = document.getElementById('confirm-delete-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        await apiCall(`/ideas/${deleteTargetId}`, 'DELETE');
        closeModal();
        document.querySelector(`[data-id="${deleteTargetId}"]`)?.remove();
        allIdeas = allIdeas.filter(i => i._id !== deleteTargetId);
        document.getElementById('idea-count').textContent = `${allIdeas.length} idea${allIdeas.length !== 1 ? 's' : ''} validated`;
        if (allIdeas.length === 0) document.getElementById('ideas-container').innerHTML = `<div class="empty-state"><div class="empty-state-icon">💡</div><p>No ideas left.</p><a href="./validate.html" class="btn btn-primary">Validate an Idea</a></div>`;
      } catch (err) { alert('Failed to delete: ' + err.message); }
      finally { btn.disabled = false; btn.innerHTML = 'Delete'; }
    }

    async function loadIdeas() {
      try {
        allIdeas = await apiCall('/ideas');
        document.getElementById('idea-count').textContent = `${allIdeas.length} idea${allIdeas.length !== 1 ? 's' : ''} validated`;

        if (allIdeas.length === 0) {
          document.getElementById('ideas-container').innerHTML = `<div class="empty-state"><div class="empty-state-icon">💡</div><p>You haven't validated any ideas yet.</p><a href="./validate.html" class="btn btn-primary">Validate Your First Idea</a></div>`;
          return;
        }

        document.getElementById('ideas-container').innerHTML = `
          <div class="ideas-grid">
            ${allIdeas.map(idea => `
              <div class="idea-card" data-id="${idea._id}">
                <div class="idea-card-header">
                  <div>
                    <div class="idea-card-title">${idea.startupName}</div>
                    <div style="margin-top:0.4rem;"><span class="badge badge-purple">${idea.industry}</span></div>
                  </div>
                  <div class="idea-card-score">${idea.analysis?.marketScore || '—'}<small>/10</small></div>
                </div>
                <p class="idea-card-description">${idea.description}</p>
                <div class="idea-card-footer">
                  <span class="idea-date">${formatDate(idea.createdAt)}</span>
                  <div class="idea-card-actions">
                    <button class="btn btn-outline btn-sm" onclick="window.location.href='./result.html?id=${idea._id}'">View Analysis</button>
                    <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${idea._id}')">Delete</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        document.getElementById('ideas-container').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    loadIdeas();
  </script>
</body>
</html>
